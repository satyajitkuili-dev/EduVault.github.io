<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduVault — Smart Classroom Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --sb:#1B3025;--sb-hover:#2D4A35;--sb-active:#3A5C43;--sb-txt:#9DC4A8;--sb-txt-a:#FFFFFF;
  --acc:#D4A017;--acc-l:#FFF3C4;--acc-d:#A67C00;
  --bg:#F4F1EB;--card:#FFFFFF;--txt:#1A1A1A;--txt-m:#6B6B6B;
  --border:#E2DDD4;--danger:#C0392B;--success:#1E7E34;
  --blue:#1565C0;--shadow:0 4px 20px rgba(0,0,0,.1);--r:14px;
  --font-head:'Playfair Display',serif;--font-body:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--txt);overflow:hidden}

/* ======= SCROLLBAR ======= */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* ======= LOGIN PAGE ======= */
#login-page{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0D1F14 0%,#1B3025 40%,#2D4A35 100%);
  z-index:1000;
}
.login-bg-pattern{
  position:absolute;inset:0;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.login-card{
  background:rgba(255,255,255,.97);border-radius:20px;padding:44px;
  width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,.4);
  position:relative;animation:fadeUp .5s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:var(--font-head);font-size:2rem;color:#1B3025;line-height:1}
.login-logo .tagline{font-size:.8rem;color:var(--txt-m);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.login-logo .icon-wrap{
  width:64px;height:64px;background:linear-gradient(135deg,#1B3025,#3A5C43);
  border-radius:16px;display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:12px;box-shadow:0 8px 24px rgba(27,48,37,.3);
}
.login-logo .icon-wrap svg{width:32px;height:32px;fill:var(--acc)}
.login-tabs{display:flex;background:#F0EDE6;border-radius:10px;padding:4px;margin-bottom:28px;gap:4px}
.login-tab{
  flex:1;padding:10px;text-align:center;cursor:pointer;border-radius:7px;
  font-weight:600;font-size:.9rem;color:var(--txt-m);transition:.2s;border:none;background:none;
}
.login-tab.active{background:#1B3025;color:#fff;box-shadow:0 2px 8px rgba(27,48,37,.3)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.83rem;font-weight:700;color:#444;margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase}
.form-group input,.form-group select{
  width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:9px;
  font-family:var(--font-body);font-size:.95rem;color:var(--txt);background:#fafafa;
  transition:.2s;outline:none;
}
.form-group input:focus,.form-group select:focus{border-color:#1B3025;background:#fff;box-shadow:0 0 0 3px rgba(27,48,37,.1)}
.btn-primary{
  width:100%;padding:13px;background:linear-gradient(135deg,#1B3025,#3A5C43);
  color:#fff;border:none;border-radius:10px;font-family:var(--font-body);
  font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;
  letter-spacing:.02em;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(27,48,37,.35)}
.btn-primary:active{transform:translateY(0)}
.login-hint{text-align:center;margin-top:18px;font-size:.82rem;color:var(--txt-m)}
.login-hint strong{color:#1B3025}
.login-error{
  background:#FFEBEE;border:1px solid #FFCDD2;color:#C62828;
  padding:10px 14px;border-radius:8px;font-size:.88rem;font-weight:600;margin-bottom:16px;display:none;
}

/* ======= APP LAYOUT ======= */
#app{display:none;height:100vh;flex-direction:row}
#app.visible{display:flex}

/* ======= SIDEBAR ======= */
#sidebar{
  width:260px;min-width:260px;background:var(--sb);display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
}
.sb-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-logo .logo-icon{
  width:36px;height:36px;background:linear-gradient(135deg,var(--acc),var(--acc-d));
  border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sb-logo .logo-icon svg{width:18px;height:18px;fill:#1B3025}
.sb-logo h2{font-family:var(--font-head);font-size:1.25rem;color:#fff;line-height:1.1}
.sb-logo span{font-size:.7rem;color:var(--sb-txt);display:block;text-transform:uppercase;letter-spacing:.08em}
.sb-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-user-name{color:#fff;font-weight:700;font-size:.9rem}
.sb-user-role{color:var(--acc);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.sb-user-class{color:var(--sb-txt);font-size:.78rem;margin-top:1px}
.sb-nav{padding:12px 10px;flex:1}
.sb-section-label{
  font-size:.68rem;color:rgba(157,196,168,.5);text-transform:uppercase;letter-spacing:.12em;
  font-weight:800;padding:12px 10px 6px;
}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;
  cursor:pointer;transition:.15s;color:var(--sb-txt);font-size:.9rem;font-weight:600;
  margin-bottom:2px;text-decoration:none;
}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:var(--acc);color:#1B3025}
.sb-item .sb-icon{width:18px;height:18px;flex-shrink:0;opacity:.8}
.sb-item.active .sb-icon{opacity:1}
.sb-item .badge{
  margin-left:auto;background:rgba(255,255,255,.15);color:#fff;
  font-size:.7rem;font-weight:800;padding:2px 7px;border-radius:99px;
}
.sb-item.active .badge{background:rgba(27,48,37,.25);color:#1B3025}
.sb-classes{padding:0 10px 8px}
.classes-grid-sb{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:6px}
.class-chip{
  background:rgba(255,255,255,.07);border-radius:6px;padding:5px 2px;text-align:center;
  font-size:.75rem;font-weight:700;color:var(--sb-txt);cursor:pointer;transition:.15s;
}
.class-chip:hover{background:rgba(255,255,255,.15);color:#fff}
.class-chip.active{background:var(--acc);color:#1B3025}
.sb-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08)}
.sb-logout{
  display:flex;align-items:center;gap:8px;color:rgba(157,196,168,.7);
  font-size:.85rem;cursor:pointer;transition:.2s;font-weight:600;
}
.sb-logout:hover{color:#FF6B6B}
.sb-logout svg{width:16px;height:16px}

/* ======= MAIN CONTENT ======= */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:.88rem;color:var(--txt-m)}
.breadcrumb .sep{color:var(--border)}
.breadcrumb .current{color:var(--txt);font-weight:700}
.topbar-actions{display:flex;align-items:center;gap:10px}
.btn{
  padding:8px 16px;border-radius:8px;font-family:var(--font-body);font-size:.85rem;
  font-weight:700;cursor:pointer;border:none;transition:.2s;display:inline-flex;align-items:center;gap:6px;
}
.btn-sm{padding:7px 13px;font-size:.8rem}
.btn-green{background:linear-gradient(135deg,#1B3025,#3A5C43);color:#fff}
.btn-green:hover{opacity:.9;transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--acc),var(--acc-d));color:#1B3025}
.btn-gold:hover{opacity:.9;transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--txt-m)}
.btn-outline:hover{border-color:var(--txt-m);color:var(--txt)}
.btn-danger{background:#FFEBEE;color:var(--danger);border:1px solid #FFCDD2}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--txt-m);padding:7px;border-radius:8px}
.btn-ghost:hover{background:var(--bg);color:var(--txt)}

#content{flex:1;overflow-y:auto;padding:28px}

/* ======= PAGE HEADER ======= */
.page-header{margin-bottom:28px}
.page-title{font-family:var(--font-head);font-size:1.8rem;font-weight:700;color:var(--txt);line-height:1.2}
.page-sub{font-size:.9rem;color:var(--txt-m);margin-top:6px}
.page-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}

/* ======= STATS ======= */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px}
.stat-card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.stat-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.stat-icon.green{background:#E8F5E9}
.stat-icon.gold{background:#FFF8E1}
.stat-icon.blue{background:#E3F2FD}
.stat-icon.purple{background:#F3E5F5}
.stat-icon svg{width:22px;height:22px}
.stat-icon.green svg{color:#2E7D32}
.stat-icon.gold svg{color:#F57F17}
.stat-icon.blue svg{color:#1565C0}
.stat-icon.purple svg{color:#6A1B9A}
.stat-num{font-family:var(--font-head);font-size:2rem;font-weight:700;line-height:1}
.stat-label{font-size:.82rem;color:var(--txt-m);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* ======= CARDS ======= */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow)}
.card-pad{padding:24px}

/* ======= CLASS GRID ======= */
.classes-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.class-card{
  background:var(--card);border-radius:var(--r);padding:22px;
  cursor:pointer;transition:.2s;border:2px solid transparent;box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.class-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--acc),#2D7D32);
}
.class-card:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.15)}
.class-card-num{font-family:var(--font-head);font-size:2rem;font-weight:700;color:#1B3025;line-height:1}
.class-card-label{font-size:.75rem;color:var(--txt-m);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-top:2px}
.class-card-stats{display:flex;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.class-stat{font-size:.8rem;color:var(--txt-m)}
.class-stat strong{color:var(--txt);font-weight:700}

/* ======= SUBJECTS GRID ======= */
.subjects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.subject-card{
  background:var(--card);border-radius:var(--r);padding:20px;
  cursor:pointer;transition:.2s;border:2px solid transparent;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px;
}
.subject-card:hover{border-color:#1B3025;transform:translateX(4px)}
.subject-icon{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.3rem;
}
.subject-name{font-weight:700;font-size:.95rem;color:var(--txt)}
.subject-count{font-size:.8rem;color:var(--txt-m);margin-top:2px}
.subject-arrow{margin-left:auto;color:var(--border);font-size:1.2rem}

/* ======= FILE LIST ======= */
.file-list{display:flex;flex-direction:column;gap:10px}
.file-item{
  background:var(--card);border-radius:10px;padding:14px 18px;
  display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);
  transition:.15s;border:1px solid var(--border);
}
.file-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:var(--acc)}
.file-icon{
  width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;
}
.file-icon.pdf{background:#FFEBEE;color:#C62828}
.file-icon.img{background:#E3F2FD;color:#1565C0}
.file-icon.ppt{background:#FFF3E0;color:#E65100}
.file-icon.doc{background:#E8EAF6;color:#283593}
.file-icon.xls{background:#E8F5E9;color:#1B5E20}
.file-icon.vid{background:#F3E5F5;color:#4A148C}
.file-icon.zip{background:#FFF8E1;color:#F57F17}
.file-icon.def{background:#F5F5F5;color:#424242}
.file-info{flex:1;min-width:0}
.file-name{font-weight:700;font-size:.9rem;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:.78rem;color:var(--txt-m);margin-top:2px}
.file-desc{font-size:.82rem;color:var(--txt-m);margin-top:3px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-actions{display:flex;gap:6px;flex-shrink:0}

/* ======= UPLOAD AREA ======= */
.upload-zone{
  border:2px dashed var(--border);border-radius:var(--r);padding:40px;text-align:center;
  transition:.2s;cursor:pointer;background:#fafaf8;
}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--acc);background:var(--acc-l)}
.upload-zone .upload-icon{font-size:2.5rem;margin-bottom:12px}
.upload-zone h3{font-family:var(--font-head);font-size:1.1rem;color:var(--txt)}
.upload-zone p{font-size:.85rem;color:var(--txt-m);margin-top:6px}
.upload-zone .file-types{font-size:.78rem;color:var(--txt-m);margin-top:8px}
#file-input{display:none}

/* ======= STUDENTS TABLE ======= */
.students-table{width:100%;border-collapse:collapse}
.students-table th{
  background:#F8F6F1;padding:11px 16px;text-align:left;font-size:.8rem;
  color:var(--txt-m);font-weight:800;text-transform:uppercase;letter-spacing:.06em;
  border-bottom:2px solid var(--border);
}
.students-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.9rem}
.students-table tr:hover td{background:#FAFAF8}
.students-table tr:last-child td{border-bottom:none}
.badge-class{
  background:var(--acc-l);color:var(--acc-d);padding:3px 10px;border-radius:99px;
  font-size:.75rem;font-weight:800;
}

/* ======= MODALS ======= */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px);
}
#modal-overlay.show{display:flex}
.modal{
  background:var(--card);border-radius:18px;padding:32px;width:100%;max-width:480px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);animation:fadeUp .25s ease;
}
.modal h3{font-family:var(--font-head);font-size:1.4rem;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.modal-close{position:absolute;top:16px;right:16px}

/* ======= TOAST ======= */
#toast-wrap{position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{
  background:#1A1A1A;color:#fff;padding:12px 18px;border-radius:10px;
  font-size:.88rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);
  animation:slideIn .3s ease;display:flex;align-items:center;gap:10px;min-width:250px;
}
.toast.success{background:#1B3025;border-left:4px solid var(--acc)}
.toast.error{background:#B71C1C;border-left:4px solid #FF6B6B}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOut{to{opacity:0;transform:translateX(30px)}}

/* ======= EMPTY STATE ======= */
.empty-state{text-align:center;padding:60px 20px;color:var(--txt-m)}
.empty-state .empty-icon{font-size:3.5rem;margin-bottom:16px;display:block}
.empty-state h3{font-family:var(--font-head);font-size:1.2rem;color:var(--txt);margin-bottom:8px}
.empty-state p{font-size:.88rem}

/* ======= SECTION HEADER ======= */
.section-title{
  font-family:var(--font-head);font-size:1.2rem;font-weight:600;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);margin-left:6px}

/* ======= BACK BUTTON ======= */
.back-btn{
  display:inline-flex;align-items:center;gap:6px;color:var(--txt-m);font-size:.85rem;
  font-weight:600;cursor:pointer;margin-bottom:20px;transition:.2s;
}
.back-btn:hover{color:var(--txt)}
.back-btn svg{width:16px;height:16px}

/* ======= SEARCH ======= */
.search-bar{
  display:flex;align-items:center;gap:8px;background:var(--card);
  border:2px solid var(--border);border-radius:9px;padding:8px 14px;
  transition:.2s;
}
.search-bar:focus-within{border-color:#1B3025}
.search-bar input{border:none;outline:none;font-family:var(--font-body);font-size:.9rem;flex:1;background:transparent}
.search-bar svg{width:16px;height:16px;color:var(--txt-m);flex-shrink:0}

/* ======= SETTINGS ======= */
.settings-section{background:var(--card);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.settings-section h3{font-family:var(--font-head);font-size:1.1rem;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* ======= ANIMATIONS ======= */
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.slide-up{animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ======= PROGRESS ======= */
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),#2D7D32);border-radius:2px;transition:.3s}

/* ======= RESPONSIVE ======= */
@media(max-width:1200px){.classes-grid{grid-template-columns:repeat(3,1fr)}.subjects-grid{grid-template-columns:repeat(2,1fr)}.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  #sidebar{width:220px;min-width:220px}
  .classes-grid{grid-template-columns:repeat(2,1fr)}
  #content{padding:16px}
}

/* ======= SUBJECT COLORS ======= */
.sc-0{background:#E8F5E9;color:#1B5E20}
.sc-1{background:#E3F2FD;color:#0D47A1}
.sc-2{background:#FFF8E1;color:#E65100}
.sc-3{background:#FCE4EC;color:#880E4F}
.sc-4{background:#EDE7F6;color:#4527A0}
.sc-5{background:#E0F2F1;color:#004D40}
.sc-6{background:#FFF3E0;color:#BF360C}
.sc-7{background:#F1F8E9;color:#33691E}
.sc-8{background:#E8EAF6;color:#1A237E}
.sc-9{background:#FAFAFA;color:#212121}

/* ======= UPLOAD PROGRESS ======= */
.upload-progress{
  background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--border);
  margin-bottom:10px;
}
.upload-progress .up-name{font-weight:600;font-size:.88rem;margin-bottom:8px}
.upload-progress .up-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.upload-progress .up-fill{height:100%;background:linear-gradient(90deg,#1B3025,var(--acc));border-radius:3px;width:0;transition:width .3s}

/* ======= PASSWORD STRENGTH ======= */
.pw-strength{font-size:.78rem;margin-top:5px;font-weight:600}
.pw-strength.weak{color:#C62828}
.pw-strength.ok{color:#F57F17}
.pw-strength.strong{color:#2E7D32}

/* ======= FILE VIEWER OVERLAY ======= */
#file-viewer{
  position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9000;
  display:none;align-items:center;justify-content:center;flex-direction:column;
}
#file-viewer.show{display:flex}

// =====================================================
// DATABASE (IndexedDB)
// =====================================================
class EduDB {
  constructor(){this.db=null;this.ready=false}
  async init(){
    return new Promise((res,rej)=>{
      const req=indexedDB.open('EduVaultDB',2);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('files')){
          const s=db.createObjectStore('files',{keyPath:'id'});
          s.createIndex('classId','classId',{unique:false});
          s.createIndex('subject','subject',{unique:false});
        }
      };
      req.onsuccess=e=>{this.db=e.target.result;this.ready=true;res()};
      req.onerror=()=>rej(req.error);
    });
  }
  async saveFile(data){
    return new Promise((res,rej)=>{
      const tx=this.db.transaction('files','readwrite');
      tx.objectStore('files').put(data).onsuccess=()=>res();
      tx.onerror=()=>rej(tx.error);
    });
  }
  async getFile(id){
    return new Promise((res,rej)=>{
      const tx=this.db.transaction('files','readonly');
      const req=tx.objectStore('files').get(id);
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>rej(req.error);
    });
  }
  async deleteFile(id){
    return new Promise((res,rej)=>{
      const tx=this.db.transaction('files','readwrite');
      tx.objectStore('files').delete(id).onsuccess=()=>res();
      tx.onerror=()=>rej(tx.error);
    });
  }
  async getAllFileIds(){
    return new Promise((res,rej)=>{
      const tx=this.db.transaction('files','readonly');
      const req=tx.objectStore('files').getAllKeys();
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>rej(req.error);
    });
  }
}
const db=new EduDB();

// =====================================================
// STORAGE HELPERS

  get:k=>{ try{return JSON.parse(localStorage.getItem(k))}catch{return null} },

};

      id:'teacher_001',name:'Teacher Admin',username:'admin',

    LS.set('ev_settings',{schoolName:'EduVault School',teacherName:'Teacher'});
  }
  if(!LS.get('ev_subjects')){
    LS.set('ev_subjects',JSON.parse(JSON.stringify(DEFAULT_SUBJECTS)));
  }
  if(!LS.get('ev_filemeta')){LS.set('ev_filemeta',[])}
}

// =====================================================
// AUTH
// =====================================================
let currentUser=null;
function getSession(){return LS.get('ev_session')}
function setSession(u){LS.set('ev_session',u);currentUser=u}
function clearSession(){LS.del('ev_session');currentUser=null}
function login(username,password,role){
  const users=LS.get('ev_users')||[];
  return users.find(u=>u.username===username&&u.password===password&&u.role===role)||null;
}

// =====================================================
// FILE METADATA
// =====================================================
function getMeta(){return LS.get('ev_filemeta')||[]}
function saveMeta(meta){LS.set('ev_filemeta',meta)}
function addMeta(m){const meta=getMeta();meta.push(m);saveMeta(meta)}
function removeMeta(id){saveMeta(getMeta().filter(m=>m.id!==id))}
function getMetaByClass(classId){return getMeta().filter(m=>m.classId===classId)}
function getMetaBySubject(classId,subject){return getMeta().filter(m=>m.classId===classId&&m.subject===subject)}

// =====================================================
// SUBJECTS
// =====================================================
function getSubjects(classId){
  const s=LS.get('ev_subjects')||{};
  return s[classId]||DEFAULT_SUBJECTS[classId]||[];
}
function addSubject(classId,name){
  const s=LS.get('ev_subjects')||JSON.parse(JSON.stringify(DEFAULT_SUBJECTS));
  if(!s[classId])s[classId]=[];
  if(!s[classId].includes(name))s[classId].push(name);
  LS.set('ev_subjects',s);
}
function removeSubject(classId,name){
  const s=LS.get('ev_subjects')||JSON.parse(JSON.stringify(DEFAULT_SUBJECTS));
  if(s[classId])s[classId]=s[classId].filter(x=>x!==name);
  LS.set('ev_subjects',s);
}

// STUDENTS
// =====================================================
function getStudents(){return (LS.get('ev_users')||[]).filter(u=>u.role==='student')}
function addStudent(data){
  const users=LS.get('ev_users')||[];
  const id='stu_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  users.push({...data,id,role:'student'});
  LS.set('ev_users',users);
}
function removeStudent(id){
  LS.set('ev_users',(LS.get('ev_users')||[]).filter(u=>u.id!==id));
}
function updateUser(id,updates){
  const users=(LS.get('ev_users')||[]).map(u=>u.id===id?{...u,...updates}:u);
  LS.set('ev_users',users);
}

function fmtSize(bytes){
  if(bytes<1024)return bytes+'B';
  if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';
  return(bytes/1048576).toFixed(1)+'MB';
}
function fmtDate(ts){
  return new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});

function checkPwStrength(input){
  const v=input.value;const el=document.getElementById('pw-strength-ind');
  if(!v){el.textContent='';return}
  let score=0;
  if(v.length>=8)score++;if(v.length>=12)score++;
  if(/[A-Z]/.test(v))score++;if(/[0-9]/.test(v))score++;if(/[^A-Za-z0-9]/.test(v))score++;
  if(score<=1){el.textContent='Weak';el.className='pw-strength weak'}
  else if(score<=3){el.textContent='Moderate';el.className='pw-strength ok'}
  else{el.textContent='Strong ✓';el.className='pw-strength strong'}
}

function saveSettings(){
  const sn=document.getElementById('set-school').value.trim();
  const tn=document.getElementById('set-tname').value.trim();
  if(!sn||!tn){showToast('error','Please fill in all fields');return}
  LS.set('ev_settings',{schoolName:sn,teacherName:tn});
  document.getElementById('sb-school-name').textContent=sn;
  showToast('success','Settings saved successfully!');
}

function changePassword(){
  const cur=document.getElementById('set-cur-pw').value;
  const nw=document.getElementById('set-new-pw').value;
  const conf=document.getElementById('set-conf-pw').value;
  const teacher=(LS.get('ev_users')||[]).find(u=>u.role==='teacher');
  if(teacher.password!==cur){showToast('error','Current password is incorrect');return}
  if(nw.length<6){showToast('error','Password must be at least 6 characters');return}
  if(nw!==conf){showToast('error','Passwords do not match');return}
  updateUser(teacher.id,{password:nw});
  showToast('success','Password updated successfully!');
  document.getElementById('set-cur-pw').value='';
  document.getElementById('set-new-pw').value='';
  document.getElementById('set-conf-pw').value='';
}

      </div>

// =====================================================
// FILE UPLOAD HANDLERS
// =====================================================
function handleDragOver(e){
  e.preventDefault();document.getElementById('upload-zone').classList.add('drag-over');
}
function handleDragLeave(){
  document.getElementById('upload-zone').classList.remove('drag-over');
}
function handleDrop(e,classId,subject){
  e.preventDefault();document.getElementById('upload-zone').classList.remove('drag-over');
  const files=Array.from(e.dataTransfer.files);
  if(files.length) processUpload(files,classId,subject);
}
function handleFileInput(input,classId,subject){
  const files=Array.from(input.files);
  if(files.length) processUpload(files,classId,subject);
  input.value='';
}

async function processUpload(files,classId,subject){
  const desc=document.getElementById('upload-desc')?.value||'';
  const progressArea=document.getElementById('upload-progress-area');
  
  for(const file of files){
    const id=genId();
    // Create progress item
    const pDiv=document.createElement('div');
    pDiv.className='upload-progress';
    pDiv.id='prog-'+id;
    pDiv.innerHTML=`<div class="up-name">${fileIconEmoji(file.name)} ${file.name}</div><div class="up-bar"><div class="up-fill" id="fill-${id}"></div></div><div style="font-size:.78rem;color:var(--txt-m);margin-top:4px" id="status-${id}">Reading file...</div>`;
    progressArea.appendChild(pDiv);

    try{
      const arrayBuffer=await readFileAsArrayBuffer(file,id);
      document.getElementById('status-'+id).textContent='Saving...';
      document.getElementById('fill-'+id).style.width='80%';

      await db.saveFile({id,classId,subject,name:file.name,type:file.type,size:file.size,data:arrayBuffer});
      addMeta({id,classId,subject,name:file.name,type:file.type,size:file.size,description:desc,uploadedAt:Date.now()});

      document.getElementById('fill-'+id).style.width='100%';
      document.getElementById('status-'+id).textContent='✅ Uploaded successfully';
      document.getElementById('status-'+id).style.color='var(--success)';
      setTimeout(()=>pDiv.remove(),3000);
    }catch(err){
      document.getElementById('status-'+id).textContent='❌ Upload failed: '+err.message;
      document.getElementById('status-'+id).style.color='var(--danger)';
    }
  }

  // Refresh file list
  setTimeout(()=>{
    const newFiles=getMetaBySubject(classId,subject);
    const area=document.getElementById('file-list-area');
    if(area) area.innerHTML=renderFileList(newFiles,true);
    renderSidebar();
  },500);
  showToast('success',`${files.length} file${files.length>1?'s':''} uploaded!`);
}

function readFileAsArrayBuffer(file,id){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onprogress=e=>{
      if(e.lengthComputable){
        const pct=Math.round(e.loaded/e.total*70);
        const el=document.getElementById('fill-'+id);
        if(el) el.style.width=pct+'%';
      }
    };
    reader.onload=e=>res(e.target.result);
    reader.onerror=()=>rej(new Error('File read failed'));
    reader.readAsArrayBuffer(file);
  });
}

// =====================================================
// FILE DOWNLOAD & PREVIEW
// =====================================================
async function downloadFile(id,name,btn){
  const orig=btn.innerHTML;btn.innerHTML='⏳';btn.disabled=true;
  try{
    const record=await db.getFile(id);
    if(!record){showToast('error','File not found in storage');return}
    const blob=new Blob([record.data],{type:record.type||'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=name;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    showToast('success','Download started!');
  }catch(e){showToast('error','Download failed')}
  finally{btn.innerHTML=orig;btn.disabled=false}
}

async function previewFile(id,name,btn){
  const orig=btn.innerHTML;btn.innerHTML='⏳';btn.disabled=true;
  try{
    const record=await db.getFile(id);
    if(!record){showToast('error','File not found');return}
    const blob=new Blob([record.data],{type:record.type||'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const ext=(name.split('.').pop()||'').toLowerCase();
    const imgExts=['png','jpg','jpeg','gif','webp','bmp','svg'];
    const viewer=document.getElementById('file-viewer');
    const content=document.getElementById('fv-content');
    document.getElementById('fv-title').textContent=name;
    content.innerHTML='';

    if(imgExts.includes(ext)){
      const img=document.createElement('img');img.src=url;content.appendChild(img);
    }else{
      const iframe=document.createElement('iframe');
      if(ext==='pdf'){iframe.src=url+'#toolbar=1';}
      else{iframe.src='https://docs.google.com/viewer?embedded=true&url='+encodeURIComponent(url);showToast('','Note: Large files may take a moment to preview')}
      iframe.src=url;
      content.appendChild(iframe);
    }
    viewer.classList.add('show');
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){showToast('error','Preview failed. Try downloading instead.')}
  finally{btn.innerHTML=orig;btn.disabled=false}
}

function closeFileViewer(){
  document.getElementById('file-viewer').classList.remove('show');
  document.getElementById('fv-content').innerHTML='';
}

async function deleteFile(id){
  closeModal();

  await db.deleteFile(id);
  removeMeta(id);
  const el=document.getElementById('fi-'+id);
  if(el){el.style.animation='slideOut .3s ease forwards';setTimeout(()=>el.remove(),300)}
  const newFiles=getMetaBySubject(meta.classId,meta.subject);
  const area=document.getElementById('file-list-area');
  if(area && !document.getElementById('fi-'+id)) area.innerHTML=renderFileList(newFiles,true);
  renderSidebar();
  showToast('success','File deleted');
}

  showModal(`
    <div class="confirm-modal">
      <div class="warn-icon">🚨</div>
      <h3>Clear ALL Data?</h3>
      <p>This will permanently delete <strong>all files, students, and settings</strong>. The teacher account will be reset to defaults.<br><br>This <strong>cannot be undone!</strong></p>

        <button class="btn btn-danger" onclick="clearAllData()">Clear Everything</button>
      </div>
    </div>
  `);
}

async function clearAllData(){
  closeModal();
  // Clear IndexedDB
  const ids=await db.getAllFileIds();
  for(const id of ids) await db.deleteFile(id);
  // Clear localStorage except session
  localStorage.clear();
  initDefaults();
  showToast('success','All data cleared. Reloading...');
  setTimeout(()=>window.location.reload(),1500);
}

function addStudentSubmit(){

function editStudentSubmit(id){
  const name=document.getElementById('es-name').value.trim();
  const username=document.getElementById('es-user').value.trim();
  const password=document.getElementById('es-pass').value;
  const studentClass=document.getElementById('es-class').value;
  if(!name||!username){showToast('error','Name and username are required');return}
  const updates={name,username,studentClass};
  if(password) updates.password=password;

  if(currentUser.id===id) setSession({...currentUser,...updates});

  showToast('success','Student updated');

function addSubjectSubmit(classId){

  if(!name){showToast('error','Please enter a subject name');return}

  closeModal();navigate('teacher-class',{classId});

function showModal(html){
  document.getElementById('modal-inner').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-overlay'))return;
  document.getElementById('modal-overlay').classList.remove('show');
}

// =====================================================
// TOAST NOTIFICATIONS
// =====================================================
function showToast(type,message){
  const wrap=document.getElementById('toast-wrap');
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.innerHTML=`<span>${type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span> ${message}`;
  wrap.appendChild(el);
  setTimeout(()=>{el.style.animation='slideOut .3s ease forwards';setTimeout(()=>el.remove(),300)},3000);
}

// =====================================================
// LOGIN UI
// =====================================================
let loginTab='teacher';
function switchLoginTab(tab){
  loginTab=tab;
  document.querySelectorAll('.login-tab').forEach((el,i)=>el.classList.toggle('active',i===(tab==='teacher'?0:1)));
  document.getElementById('teacher-login-form').style.display=tab==='teacher'?'block':'none';
  document.getElementById('student-login-form').style.display=tab==='student'?'block':'none';
  document.getElementById('login-error').style.display='none';
}

function doLogin(role){
  const uEl=role==='teacher'?document.getElementById('t-username'):document.getElementById('s-username');
  const pEl=role==='teacher'?document.getElementById('t-password'):document.getElementById('s-password');
  const user=login(uEl.value.trim(),pEl.value,role);
  const errEl=document.getElementById('login-error');
  if(!user){
    errEl.textContent=`Invalid ${role} credentials. Please try again.`;
    errEl.style.display='block';
    return;
  }
  errEl.style.display='none';
  setSession(user);
  startApp(user);
}

// =====================================================
// APP STARTUP
// =====================================================
function startApp(user){
  document.getElementById('login-page').style.animation='fadeOut .4s ease forwards';
  setTimeout(()=>{
    document.getElementById('login-page').style.display='none';
    document.getElementById('app').classList.add('visible');
    renderSidebar();
    if(user.role==='teacher') navigate('teacher-home');
    else navigate('student-home');
  },400);
}

function logout(){
  clearSession();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-page').style.display='flex';
  document.getElementById('login-page').style.animation='fadeUp .4s ease';
  document.getElementById('t-username').value='';
  document.getElementById('t-password').value='';
  document.getElementById('s-username').value='';
  document.getElementById('s-password').value='';
  loginTab='teacher';switchLoginTab('teacher');
}

// Keyframes for logout
const fadeOutStyle=document.createElement('style');
fadeOutStyle.textContent=`@keyframes fadeOut{to{opacity:0}}`;
document.head.appendChild(fadeOutStyle);

// =====================================================
// INIT
// =====================================================
(async()=>{
  await db.init();
  initDefaults();
  const session=getSession();
  if(session){
    const users=LS.get('ev_users')||[];
    const freshUser=users.find(u=>u.id===session.id);
    if(freshUser){currentUser=freshUser;startApp(freshUser);return}
  }
})();

// Keyboard: Escape closes modal/viewer
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeModal();
    if(document.getElementById('file-viewer').classList.contains('show')) closeFileViewer();
  }
});
</script>
